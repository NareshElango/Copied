<div class="login-page">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="login-layout">
    <!-- LEFT SIDE -->
    <div class="left-section">
      <div class="brand-content">
        <div class="mini-label">ALL-IN-ONE SAAS</div>
        <h1>
          Manage <br />
          Everything <br />
          <span>Smarter</span>
        </h1>
        <p class="description">
          Securely manage organizations, branches, users, subscriptions,
          and AI-driven workflows in one intelligent platform.
        </p>
      </div>

      <div class="illustration-scene">
        <!-- Decorative line accent -->
        <svg
          class="accent-line"
          viewBox="0 0 700 320"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.15" />
              <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.55" />
              <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.15" />
            </linearGradient>
          </defs>

          <path
            d="M20 210
               C120 150, 220 250, 320 190
               C420 130, 520 230, 680 150"
            stroke="url(#lineGlow)"
            stroke-width="4"
            fill="none"
            stroke-linecap="round"
          />

          <circle cx="160" cy="195" r="6" fill="#60a5fa" opacity="0.65" />
          <circle cx="320" cy="190" r="7" fill="#3b82f6" opacity="0.75" />
          <circle cx="505" cy="188" r="6" fill="#60a5fa" opacity="0.65" />
        </svg>

        <!-- <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div> -->
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-section">
      <div class="login-card">
        <div class="card-glow"></div>

        <!-- AGGRESSIVE LION MASCOT -->
        <div
          class="mascot-wrap"
          [class.password-hidden]="isMascotActive && !showPassword"
          [class.password-visible]="isMascotActive && showPassword"
        >
          <div class="mascot-bg"></div>

          <svg
            viewBox="0 0 500 420"
            class="mascot-svg"
            xmlns="http://www.w3.org/2000/svg"
          >
            <!-- Blue aura -->
            <circle cx="250" cy="170" r="150" fill="rgba(59,130,246,0.10)" />

            <!-- Mane Outer -->
            <circle cx="250" cy="165" r="118" fill="#d97706" />
            <circle cx="175" cy="105" r="42" fill="#f59e0b" />
            <circle cx="325" cy="105" r="42" fill="#f59e0b" />
            <circle cx="150" cy="175" r="38" fill="#f59e0b" />
            <circle cx="350" cy="175" r="38" fill="#f59e0b" />
            <circle cx="205" cy="68" r="34" fill="#fbbf24" />
            <circle cx="295" cy="68" r="34" fill="#fbbf24" />
            <circle cx="210" cy="255" r="34" fill="#f59e0b" />
            <circle cx="290" cy="255" r="34" fill="#f59e0b" />

            <!-- Face -->
            <circle cx="250" cy="170" r="88" fill="#fde68a" />

            <!-- Ears -->
            <circle cx="192" cy="106" r="24" fill="#92400e" />
            <circle cx="308" cy="106" r="24" fill="#92400e" />
            <circle cx="192" cy="106" r="11" fill="#fef3c7" />
            <circle cx="308" cy="106" r="11" fill="#fef3c7" />

            <!-- Angry Brows -->
            <g class="brows">
              <path
                d="M198 142 L228 150"
                stroke="#78350f"
                stroke-width="8"
                stroke-linecap="round"
              />
              <path
                d="M302 142 L272 150"
                stroke="#78350f"
                stroke-width="8"
                stroke-linecap="round"
              />
            </g>

            <!-- Eyes Open -->
            <g class="eyes-open">
              <ellipse cx="220" cy="160" rx="12" ry="15" fill="#111827" />
              <ellipse cx="280" cy="160" rx="12" ry="15" fill="#111827" />
              <circle cx="224" cy="154" r="3" fill="#ffffff" />
              <circle cx="284" cy="154" r="3" fill="#ffffff" />
            </g>

            <!-- Eyes Closed -->
            <g class="eyes-closed">
              <path
                d="M206 160 Q220 149 234 160"
                stroke="#111827"
                stroke-width="5"
                fill="none"
                stroke-linecap="round"
              />
              <path
                d="M266 160 Q280 149 294 160"
                stroke="#111827"
                stroke-width="5"
                fill="none"
                stroke-linecap="round"
              />
            </g>

            <!-- Nose -->
            <ellipse cx="250" cy="186" rx="13" ry="10" fill="#1d4ed8" />

            <!-- Muzzle -->
            <ellipse cx="250" cy="214" rx="56" ry="36" fill="#fff7ed" />

            <!-- Aggressive Mouth -->
            <path
              class="smile-line"
              d="M224 216 Q250 235 276 216"
              stroke="#1f2937"
              stroke-width="5"
              fill="none"
              stroke-linecap="round"
            />
            <path
              d="M240 210 L235 220"
              stroke="#1f2937"
              stroke-width="3"
              stroke-linecap="round"
            />
            <path
              d="M260 210 L265 220"
              stroke="#1f2937"
              stroke-width="3"
              stroke-linecap="round"
            />

            <!-- Whiskers -->
            <line
              x1="182"
              y1="206"
              x2="220"
              y2="201"
              stroke="#6b7280"
              stroke-width="3"
              stroke-linecap="round"
            />
            <line
              x1="180"
              y1="222"
              x2="220"
              y2="219"
              stroke="#6b7280"
              stroke-width="3"
              stroke-linecap="round"
            />
            <line
              x1="280"
              y1="201"
              x2="318"
              y2="206"
              stroke="#6b7280"
              stroke-width="3"
              stroke-linecap="round"
            />
            <line
              x1="280"
              y1="219"
              x2="320"
              y2="222"
              stroke="#6b7280"
              stroke-width="3"
              stroke-linecap="round"
            />

            <!-- Body -->
            <rect x="185" y="280" width="130" height="105" rx="24" fill="#1d4ed8" />
            <rect x="205" y="300" width="90" height="45" rx="12" fill="#dbeafe" />
            <text
              x="250"
              y="328"
              text-anchor="middle"
              font-size="18"
              font-weight="800"
              fill="#1d4ed8"
            >
              LION
            </text>

            <!-- Left Paw -->
            <g class="hand-left">
              <ellipse cx="175" cy="225" rx="25" ry="39" fill="#fde68a" />
            </g>

            <!-- Right Paw -->
            <g class="hand-right">
              <ellipse cx="325" cy="225" rx="25" ry="39" fill="#fde68a" />
            </g>
          </svg>
        </div>

        <h2>Sign In</h2>
        <p class="login-subtitle">Welcome back to your workspace</p>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
          <div class="form-group">
            <label>Organization Code</label>
            <input
              type="text"
              formControlName="organizationCode"
              placeholder="Enter organization code"
            />
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input
              type="email"
              formControlName="email"
              placeholder="Enter your email"
            />
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="password-box">
              <input
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                placeholder="Enter your password"
                (focus)="onPasswordFocus()"
                (blur)="onPasswordBlur()"
              />
              <button type="button" class="toggle-btn" (click)="togglePassword()">
                {{ showPassword ? 'Hide' : 'Show' }}
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="remember">
              <input type="checkbox" />
              Remember me
            </label>
            <a href="#">Forgot Password?</a>
          </div>
          <div class="success-message" *ngIf="successMessage">
            {{ successMessage }}
          </div>
          <div class="error-message" *ngIf="errorMessage">
            {{ errorMessage }}
          </div>
          <button type="submit" class="login-btn" [disabled]="isLoading">
            <span>{{isLoading?'Signing In...':'Sign In'}}</span>
            <div class="btn-shine"></div>
          </button>
        </form>

        <div class="footer-text">
          © 2026 All-In-One SaaS Platform
        </div>
      </div>
    </div>
  </div>
</div>
